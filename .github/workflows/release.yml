name: Release

# v* 태그를 푸시하면 Windows/macOS/Linux 설치본을 빌드해
# GitHub Release에 자동 업로드한다.
#   git tag v0.0.1 && git push origin v0.0.1
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ide
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ide/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Build & publish installers
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 서명 인증서 없이도 빌드되도록 (추후 코드 서명 도입 시 제거)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
