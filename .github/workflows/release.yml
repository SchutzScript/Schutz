name: Release

# v* 태그를 푸시하면 Windows(Inno Setup)/macOS/Linux 설치본을 빌드해
# GitHub Release에 자동 업로드한다.
#   git tag v0.0.2 && git push origin v0.0.2
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 매트릭스 잡들이 각자 드래프트를 만들며 경쟁하지 않도록 릴리스를 먼저 하나 만들어 둔다
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
            || gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
                 --draft --title "Schutz ${GITHUB_REF_NAME}"

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ide
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ide/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      # ── macOS / Linux: electron-builder가 빌드 + 릴리스 업로드 ──
      - name: Build & publish (mac/linux)
        if: matrix.os != 'windows-latest'
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # ── Windows: Inno Setup 설치본 (VS Code식 모던 위저드) ──
      - name: Package app directory (win)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --dir

      - name: Install Inno Setup (win)
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y --no-progress

      - name: Compile installer (win)
        if: matrix.os == 'windows-latest'
        run: node build/iscc.cjs

      - name: Upload installer to release (win)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:GITHUB_REF_NAME" (Get-ChildItem release/SchutzSetup-*.exe).FullName --repo "$env:GITHUB_REPOSITORY" --clobber
